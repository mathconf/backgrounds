<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <rect id="tile" stroke="#000" stroke-opacity="0.02" width="92" height="44"/>
    <pattern  id="pattern" patternTransform="rotate(0) scale(1)" x="0" y="0" width="276" height="132" patternUnits="userSpaceOnUse">
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(0,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(0,132)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(276,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(276,132)"/>
        <use href="#tile" fill="#222" fill-opacity="0.11" transform="translate(0,44)"/>
        <use href="#tile" fill="#222" fill-opacity="0.11" transform="translate(276,44)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.05" transform="translate(0,88)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.05" transform="translate(276,88)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.06" transform="translate(92,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.06" transform="translate(92,132)"/>
        <use href="#tile" fill="#222" fill-opacity="0.09" transform="translate(92,44)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(92,88)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.11" transform="translate(184,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.11" transform="translate(184,132)"/>
        <use href="#tile" fill="#222" fill-opacity="0.05" transform="translate(184,44)"/>
        <use href="#tile" fill="#222" fill-opacity="0.09" transform="translate(184,88)"/>
    </pattern>
  </defs>
  <rect fill="#673d7b" height="100%" width="100%" x="0" y="0" />
  <rect height="100%" width="100%" x="0" y="0" fill="url(#pattern)"/>
</svg>
