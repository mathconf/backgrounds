<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <polyline id="tile" stroke="#000" stroke-opacity="0.04" points="-50,0,0,25,50,0,0,-25" />
    <pattern  id="pattern" patternTransform="rotate(0) scale(1)" x="0" y="0" width="300" height="250" patternUnits="userSpaceOnUse">
        <use href="#tile" fill="#ddd" fill-opacity="0.03" transform="translate(0,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.03" transform="translate(0,250)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.03" transform="translate(300,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.03" transform="translate(300,250)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.06" transform="translate(0,50)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.06" transform="translate(300,50)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.13" transform="translate(0,100)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.13" transform="translate(300,100)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.07" transform="translate(0,150)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.07" transform="translate(300,150)"/>
        <use href="#tile" fill="#222" fill-opacity="0.07" transform="translate(0,200)"/>
        <use href="#tile" fill="#222" fill-opacity="0.07" transform="translate(300,200)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(100,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.12" transform="translate(100,250)"/>
        <use href="#tile" fill="#222" fill-opacity="0.17" transform="translate(100,50)"/>
        <use href="#tile" fill="#222" fill-opacity="0.17" transform="translate(100,100)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.09" transform="translate(100,150)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.13" transform="translate(100,200)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.1" transform="translate(200,0)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.1" transform="translate(200,250)"/>
        <use href="#tile" fill="#222" fill-opacity="0.16" transform="translate(200,50)"/>
        <use href="#tile" fill="#222" fill-opacity="0.13" transform="translate(200,100)"/>
        <use href="#tile" fill="#ddd" fill-opacity="0.05" transform="translate(200,150)"/>
        <use href="#tile" fill="#222" fill-opacity="0.17" transform="translate(200,200)"/>
    </pattern>
  </defs>
  <rect fill="#645935" height="100%" width="100%" x="0" y="0" />
  <rect fill="url(#pattern)" height="100%" width="100%" x="0" y="0"/>
</svg>
